packages:
  - 'apps/*'
  - 'packages/*'

# Ortak versiyonları tek yerden yönetmek için catalog kullanıyoruz.
# Paket package.json'larında "catalog:" protokolü ile referanslıyoruz.
catalog:
  # Runtime
  fastify: ^5.8.0
  '@fastify/cors': ^11.1.0
  '@fastify/autoload': ^6.3.1
  fastify-plugin: ^5.0.1
  pino-pretty: ^11.3.0
  dotenv-cli: ^8.0.0
  better-auth: ^1.3.10
  drizzle-orm: ^0.45.2
  pg: ^8.13.1
  react: ^19.0.0
  react-dom: ^19.0.0

  # AI / Cron / Google (mail gönderim Gmail API üzerinden, SMTP yok)
  '@fal-ai/client': ^1.4.0
  node-cron: ^3.0.3
  '@types/node-cron': ^3.0.11
  googleapis: ^144.0.0
  zod: ^4.0.0

  # TanStack
  '@tanstack/react-router': ^1.166.13
  '@tanstack/router-plugin': ^1.166.13
  '@tanstack/react-router-devtools': ^1.166.13
  '@tanstack/react-query': ^5.62.0
  '@tanstack/react-query-devtools': ^5.62.0
  '@tanstack/react-form': ^1.0.0

  # Styling: Tailwind v4 + shadcn/ui
  tailwindcss: ^4.2.3
  '@tailwindcss/postcss': ^4.2.3
  postcss: ^8.4.49
  postcss-loader: ^8.1.1
  clsx: ^2.1.1
  tailwind-merge: ^3.5.0
  class-variance-authority: ^0.7.1
  lucide-react: ^0.460.0
  tw-animate-css: ^1.2.5

  # Dev / build
  '@types/node': ^22.10.5
  '@types/pg': ^8.11.10
  '@types/react': ^19.0.2
  '@types/react-dom': ^19.0.2
  '@rspack/core': ^1.1.8
  '@rspack/cli': ^1.1.8
  '@rspack/plugin-react-refresh': ^1.0.11
  drizzle-kit: ^0.31.4
  tsx: ^4.19.2
  typescript: ^5.7.2
  '@typescript/native-preview': latest
  oxlint: ^1.27.0
  oxfmt: ^0.47.0

# tsgo bazen aynı gün publish ediliyor; minimumReleaseAge ayarı varsa exclude et.
minimumReleaseAgeExclude:
  - '@typescript/native-preview*'
